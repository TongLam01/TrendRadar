# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 · AI赛道版
# ═══════════════════════════════════════════════════════════════

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false

# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: false
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台（全关，只用RSS）
# ===============================================================
platforms:
  enabled: false

# ===============================================================
# 3. 数据源 - RSS 订阅
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1

  feeds:
    # ─── 前沿研究 ───
    - id: "arxiv-ai"
      name: "📄 arXiv cs.AI"
      url: "https://rss.arxiv.org/rss/cs.AI"

    - id: "arxiv-cl"
      name: "📄 arXiv cs.CL"
      url: "https://rss.arxiv.org/rss/cs.CL"

    - id: "arxiv-lg"
      name: "📄 arXiv cs.LG"
      url: "https://rss.arxiv.org/rss/cs.LG"

    - id: "arxiv-cv"
      name: "📄 arXiv cs.CV"
      url: "https://rss.arxiv.org/rss/cs.CV"

    - id: "arxiv-cr"
      name: "📄 arXiv cs.CR"
      url: "https://rss.arxiv.org/rss/cs.CR"

    - id: "huggingface"
      name: "🤗 HuggingFace Blog"
      url: "https://huggingface.co/blog/feed.xml"

    # ─── 大厂官方博客 ───
    - id: "openai"
      name: "🏢 OpenAI"
      url: "https://openai.com/blog/rss.xml"

    - id: "deepmind"
      name: "🏢 Google DeepMind"
      url: "https://deepmind.google/blog/feed/"

    - id: "google-ai"
      name: "🏢 Google AI"
      url: "https://blog.google/technology/ai/rss/"

    - id: "cohere"
      name: "🏢 Cohere"
      url: "https://cohere.com/blog/rss.xml"

    - id: "msr"
      name: "🏢 Microsoft Research"
      url: "https://www.microsoft.com/en-us/research/feed/"

    - id: "apple-ml"
      name: "🏢 Apple ML"
      url: "https://machinelearning.apple.com/rss.xml"

    - id: "nvidia"
      name: "🏢 NVIDIA Blog"
      url: "https://blogs.nvidia.com/feed/"

    - id: "nvidia-dev"
      name: "🏢 NVIDIA Developer"
      url: "https://developer.nvidia.com/blog/feed/"

    # ─── 半导体/算力 ───
    - id: "semianalysis"
      name: "🔬 SemiAnalysis"
      url: "https://www.semianalysis.com/feed"

    - id: "anandtech"
      name: "🔬 AnandTech"
      url: "https://www.anandtech.com/rss"

    - id: "tomshardware"
      name: "🔬 Tom's Hardware"
      url: "https://www.tomshardware.com/feeds/all"

    - id: "semiengineering"
      name: "🔬 SemiEngineering"
      url: "https://semiengineering.com/feed/"

    - id: "eetimes"
      name: "🔬 EE Times"
      url: "https://www.eetimes.com/feed/"

    - id: "nextplatform"
      name: "🔬 The Next Platform"
      url: "https://www.nextplatform.com/feed/"

    # ─── 行业评论/投资视角 ───
    - id: "venturebeat"
      name: "📰 VentureBeat AI"
      url: "https://venturebeat.com/category/ai/feed/"

    - id: "techcrunch-ai"
      name: "📰 TechCrunch AI"
      url: "https://techcrunch.com/category/artificial-intelligence/feed/"

    - id: "theverge-ai"
      name: "📰 The Verge AI"
      url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"

    - id: "interconnects"
      name: "📰 Interconnects"
      url: "https://www.interconnects.ai/feed"

    - id: "understanding-ai"
      name: "📰 Understanding AI"
      url: "https://www.understandingai.org/feed"

    # ─── 中文信源 ───
    - id: "jiqizhixin"
      name: "🇨🇳 机器之心"
      url: "https://www.jiqizhixin.com/rss"

    - id: "synced"
      name: "🇨🇳 Synced Review"
      url: "https://syncedreview.com/feed/"

    - id: "karpathy"
      name: "👤 Karpathy Blog"
      url: "https://karpathy.github.io/feed.xml"


# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "incremental"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 999
  max_news_per_keyword: 5

# ===============================================================
# 4.5 筛选策略（关键词匹配，不需要API）
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true


# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - rss
    - hotlist
  regions:
    hotlist: false
    new_items: false
    rss: true
    standalone: false
    ai_analysis: false


# ===============================================================
# 6. 推送通知
# ===============================================================
notification:
  enabled: false


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 7


# ===============================================================
# 8. AI 模型配置（关闭）
# ===============================================================
ai:
  model: "openai/gpt-4o-mini"
  api_key: "sk-placeholder"
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 0
  fallback_models: []


# ===============================================================
# 9. AI 分析功能（关闭）
# ===============================================================
ai_analysis:
  enabled: false
  language: "Chinese"

# ===============================================================
# 10. AI 翻译功能（关闭，用独立翻译脚本替代）
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"

# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1500
    timeout: 20
    use_proxy: false
